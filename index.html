<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Task Scheduler</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#222;min-height:100vh}
/* ── Header ── */
.hdr{background:#1e3a5f;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:1.1em;letter-spacing:-0.3px}
.hdr-right{display:flex;align-items:center;gap:10px;font-size:.85em}
/* ── Layout ── */
.wrap{max-width:700px;margin:24px auto;padding:0 16px 60px}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-title{font-size:.95em;font-weight:700;color:#1e3a5f;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e8f0fe}
/* ── Form ── */
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
label{font-size:.78em;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
input,select{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:.88em;width:100%}
input:focus,select:focus{outline:2px solid #1e3a5f;border-color:transparent}
/* ── Buttons ── */
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:.88em;cursor:pointer;font-weight:600;transition:.15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#1e3a5f;color:#fff}.btn-primary:hover:not(:disabled){background:#162d4a}
.btn-green{background:#217346;color:#fff}.btn-green:hover:not(:disabled){background:#185c39}
.btn-red{background:#c53030;color:#fff}.btn-red:hover:not(:disabled){background:#9b2020}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.6);color:#fff;padding:5px 12px}
.btn-ghost:hover{background:rgba(255,255,255,.15)}
.btn-sm{padding:4px 9px;font-size:.78em;white-space:nowrap}
.btn-full{width:100%;padding:13px;font-size:.95em}
/* ── Todo items ── */
.todo-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid #eee;border-radius:7px;margin-bottom:6px;transition:.15s}
.todo-item:hover{border-color:#c0d0e8}
.todo-item{cursor:grab}
.todo-item.dragging{opacity:.4;cursor:grabbing}
.todo-item.drag-over{border-top:2px solid #1e3a5f}
.todo-item.done{opacity:.45}
.todo-item.done .todo-name{text-decoration:line-through}
.todo-chk{width:16px;height:16px;cursor:pointer;accent-color:#217346;flex-shrink:0}
.todo-name{flex:1;font-size:.88em}
.todo-dur{font-size:.78em;color:#888;background:#f0f0f0;padding:2px 7px;border-radius:4px;white-space:nowrap}
/* ── Results ── */
.slot-item{padding:10px 12px;border-left:4px solid #217346;background:#f0f7f2;border-radius:0 7px 7px 0;margin-bottom:8px}
.slot-item.warn{border-left-color:#d97706;background:#fffbeb}
.slot-item.err{border-left-color:#c53030;background:#fff5f5}
.slot-name{font-weight:600;font-size:.9em}
.slot-time{font-size:.8em;color:#555;margin-top:3px}
/* ── Login screen ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8}
.login-box{background:#fff;border-radius:14px;padding:44px 36px;text-align:center;box-shadow:0 6px 30px rgba(0,0,0,.12);max-width:380px;width:100%;margin:16px}
.login-icon{font-size:3.2em;margin-bottom:8px}
.login-box h1{font-size:1.5em;color:#1e3a5f;margin-bottom:6px}
.login-box p{font-size:.87em;color:#777;margin-bottom:28px;line-height:1.6}
/* ── Misc ── */
.hidden{display:none!important}
.msg{padding:10px 14px;border-radius:7px;font-size:.87em;margin-top:10px}
.msg-err{background:#fff5f5;color:#c53030;border:1px solid #fca5a5}
.msg-ok{background:#f0f7f2;color:#166534;border:1px solid #86efac}
.msg-info{background:#eff6ff;color:#1e40af;border:1px solid #93c5fd}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{font-size:.75em;background:#dbeafe;color:#1e40af;padding:2px 7px;border-radius:4px}
.empty-state{text-align:center;color:#bbb;padding:24px;font-size:.87em}
</style>

<script>
// ════════════════════════════════════════════════════════
// ⚠️  A가 아래 두 값을 채워주세요 (Azure 앱 등록 후)
// ════════════════════════════════════════════════════════
const CLIENT_ID = "67cf5516-aee1-4db9-b232-fccb0b87ff94";
const TENANT_ID = "277c521d-14bc-4915-ae98-e465db3e265f";
// ════════════════════════════════════════════════════════

const SCOPES = ["User.Read", "Calendars.ReadWrite", "Calendars.Read.Shared", "MailboxSettings.Read"];

// ── MSAL ─────────────────────────────────────────────────────
// MSAL Browser 2.31+ requires initialize() before any interactive calls
let msalInst = null;
let userAccount = null;
let partnerEmailGlobal = "";

// 현재 URL (file:// 감지용)
const CURRENT_URL = location.href.split(/[?#]/)[0];
const IS_FILE_PROTOCOL = location.protocol === "file:";

async function getMsal() {
  if (msalInst) return msalInst;
  msalInst = new msal.PublicClientApplication({
    auth: {
      clientId: CLIENT_ID,
      authority: `https://login.microsoftonline.com/${TENANT_ID}`,
      // file:// 프로토콜은 Azure AD 불가 → 반드시 http(s)://로 접속해야 함
      redirectUri: CURRENT_URL
    },
    cache: { cacheLocation: "sessionStorage" }
  });
  await msalInst.initialize();
  const redirectResult = await msalInst.handleRedirectPromise();
  if (redirectResult && redirectResult.account) {
    userAccount = redirectResult.account;
    showMain(redirectResult.account.username);
  } else {
    const accounts = msalInst.getAllAccounts();
    if (accounts.length > 0) {
      userAccount = accounts[0];
      showMain(accounts[0].username);
    }
  }
  return msalInst;
}

async function login() {
  const btn = id("loginBtn");
  btn.innerHTML = '<span class="spinner"></span>로그인 중...';
  btn.disabled = true;
  try {
    const inst = await getMsal();
    await inst.loginRedirect({ scopes: SCOPES });
    return;
    userAccount = r.account;
    showMain(r.account.username);
  } catch(e) {
    showEl("loginErr", e.message || "로그인에 실패했습니다.");
    btn.innerHTML = "🔐 Microsoft 로그인";
    btn.disabled = false;
  }
}

async function logout() {
  const inst = await getMsal();
  inst.logoutRedirect();
}

async function getToken() {
  const inst = await getMsal();
  const accs = inst.getAllAccounts();
  if (!accs.length) throw new Error("로그인이 필요합니다.");
  try {
    const r = await inst.acquireTokenSilent({ scopes: SCOPES, account: accs[0] });
    return r.accessToken;
  } catch {
    await inst.acquireTokenRedirect({ scopes: SCOPES, account: accs[0] });
    return null;
  }
}

// ── Graph API ─────────────────────────────────────────────────
async function graphPost(token, path, body) {
  const r = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error?.message || JSON.stringify(data));
  return data;
}

async function graphGet(token, path) {
  const r = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error?.message || JSON.stringify(data));
  return data;
}

async function getSchedule(token, emails, startKST, endKST) {
  // KST 문자열 → UTC ISO 변환 (Outlook이 UTC로 반환하도록 강제)
  const toUtcIso = kst => new Date(kst + "+09:00").toISOString().replace(".000Z","");
  return graphPost(token, "/me/calendar/getSchedule", {
    schedules: emails,
    startTime: { dateTime: toUtcIso(startKST), timeZone: "UTC" },
    endTime:   { dateTime: toUtcIso(endKST),   timeZone: "UTC" },
    availabilityViewInterval: 15
  });
}

async function createCalEvent(token, subject, startKST, endKST) {
  // Full Access 권한으로 C의 캘린더에 직접 등록
  const target = partnerEmailGlobal
    ? `/users/${encodeURIComponent(partnerEmailGlobal)}/events`
    : "/me/events";
  return graphPost(token, target, {
    subject,
    start: { dateTime: startKST, timeZone: "Korea Standard Time" },
    end:   { dateTime: endKST,   timeZone: "Korea Standard Time" }
  });
}

// ── 시간 헬퍼 (KST 기준) ──────────────────────────────────────
// Outlook getSchedule은 UTC로 반환 → Z 붙여서 UTC 파싱
function kstToMs(s) {
  const clean = s.split(".")[0];
  // 이미 Z나 +가 있으면 그대로, 없으면 UTC(Z) 처리
  if (clean.endsWith("Z") || clean.includes("+")) return new Date(clean).getTime();
  return new Date(clean + "Z").getTime();
}
// YYYY-MM-DD + hour → UTC ms
function dateHourToMs(d, h, m = 0) {
  const hh = String(h).padStart(2,"0"), mm = String(m).padStart(2,"0");
  return new Date(`${d}T${hh}:${mm}:00+09:00`).getTime();
}
// UTC ms → KST ISO string "2026-03-25T09:30:00"
function msToKSTiso(ts) {
  const d = new Date(ts + 9 * 3600000); // shift to KST epoch
  const p = n => String(n).padStart(2,"0");
  return `${d.getUTCFullYear()}-${p(d.getUTCMonth()+1)}-${p(d.getUTCDate())}` +
         `T${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:00`;
}
// UTC ms → display string
function msToDisplay(ts) {
  return new Intl.DateTimeFormat("ko-KR", {
    timeZone: "Asia/Seoul", month:"numeric", day:"numeric",
    weekday:"short", hour:"2-digit", minute:"2-digit"
  }).format(new Date(ts));
}

// ── 스케줄링 알고리즘 ─────────────────────────────────────────
function buildSchedule(todos, scheduleData, cfg) {
  const { startDate, spreadDays, workStart, workEnd, inclSat, inclSun, bufferMins } = cfg;

  // 1. Busy blocks from all people (UTC ms)
  const busy = [];
  for (const person of (scheduleData.value || [])) {
    for (const item of (person.scheduleItems || [])) {
      if (["busy","tentative","oof","workingElsewhere"].includes(item.status)) {
        busy.push({ s: kstToMs(item.start.dateTime), e: kstToMs(item.end.dateTime) });
      }
    }
  }
  // 방금 이번 세션에서 등록한 슬롯도 busy로 추가
  for (const lb of (cfg.localBusy || [])) {
    busy.push({ s: lb.s, e: lb.e });
  }
  busy.sort((a, b) => a.s - b.s);

  // ── DEBUG: 콘솔에 busy 블록 출력 (문제 진단용) ──
  const toKST = ms => new Date(ms).toLocaleString("ko-KR", {timeZone:"Asia/Seoul"});
  console.group("📅 Busy 블록 목록 (" + busy.length + "개)");
  busy.forEach((b, i) => console.log(i, toKST(b.s), "→", toKST(b.e)));
  console.groupEnd();

  // 2. busy 블록에 버퍼 적용 후 merge
  const bufMs = bufferMins * 60000;
  const buffered = busy.map(b => ({ s: b.s - bufMs, e: b.e + bufMs }));
  buffered.sort((a, b) => a.s - b.s);
  const merged = [];
  for (const b of buffered) {
    if (!merged.length || b.s >= merged[merged.length-1].e)
      merged.push({ s: b.s, e: b.e });
    else
      merged[merged.length-1].e = Math.max(merged[merged.length-1].e, b.e);
  }

  // 3. Find free slots per working day
  const freeSlots = [];
  const [sy, sm, sd] = startDate.split("-").map(Number);
  let checked = 0, found = 0;
  while (found < spreadDays && checked < spreadDays + 14) {
    const dt = new Date(sy, sm-1, sd + checked);
    const dow = dt.getDay();
    const dateStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
    checked++;
    if (dow === 6 && !inclSat) continue;
    if (dow === 0 && !inclSun) continue;
    found++;

    const dayS = dateHourToMs(dateStr, workStart);
    const dayE = dateHourToMs(dateStr, workEnd);
    let cur = dayS;

    for (const b of merged) {
      if (b.e <= cur || b.s >= dayE) continue;
      if (b.s > cur) freeSlots.push({ s: cur, e: Math.min(b.s, dayE) });
      cur = Math.max(cur, Math.min(b.e, dayE));
    }
    if (cur < dayE) freeSlots.push({ s: cur, e: dayE });
  }

  // ── DEBUG: 빈 슬롯 출력 ──
  console.group("🟢 빈 슬롯 목록 (" + freeSlots.length + "개)");
  freeSlots.forEach((s, i) => console.log(i, toKST(s.s), "→", toKST(s.e)));
  console.groupEnd();

  // 4. Assign todos to free slots (greedy first-fit)
  const pending = todos.filter(t => !t.done);
  // bufMs는 이미 busy 블록에 적용됨 → 슬롯 배분 시 추가 버퍼 없이 순차 배치
  const ptrs = freeSlots.map(sl => sl.s); // current pointer in each slot
  const result = [];

  for (const todo of pending) {
    const durMs = todo.dur * 60000;
    let placed = false;
    for (let i = 0; i < freeSlots.length; i++) {
      if (freeSlots[i].e - ptrs[i] >= durMs) {
        result.push({ todo, s: ptrs[i], e: ptrs[i] + durMs });
        ptrs[i] += durMs;  // 버퍼는 busy 블록에 이미 적용
        placed = true;
        break;
      }
    }
    if (!placed) result.push({ todo, s: null, e: null });
  }
  return result;
}

// ── 투두 상태 ─────────────────────────────────────────────────
let todos = JSON.parse(localStorage.getItem("ts_todos") || "[]");
let assignments = [];
let scheduleCache = null;
let localBusy = []; // 이번 세션에서 방금 등록한 슬롯 (Outlook 반영 전 로컬 추적)

function saveTodos() { localStorage.setItem("ts_todos", JSON.stringify(todos)); }

function renderTodos() {
  const list = id("todoList"), empty = id("todoEmpty");
  const pendingCount = todos.filter(t => !t.done).length;
  const doneCount    = todos.filter(t =>  t.done).length;
  id("todoCount").textContent = `미완료 ${pendingCount}개 / 완료 ${doneCount}개`;

  if (!todos.length) { list.innerHTML = ""; show(empty); return; }
  hide(empty);

  const pending = todos.filter(t => !t.done);
  const done    = todos.filter(t =>  t.done);

  const renderItem = t => `
    <div class="todo-item ${t.done ? "done" : ""}" id="ti-${t.id}" draggable="true"
      ondragstart="dragStart(event,'${t.id}')" ondragover="dragOver(event)" ondrop="dropOn(event,'${t.id}')" ondragend="dragEnd(event)" ondragleave="dragLeave(event)">
      <span class="todo-name">${esc(t.name)}</span>
      <span class="todo-dur">${t.dur}분</span>
      <button class="btn btn-sm ${t.done ? "btn-primary" : "btn-green"}"
              onclick="toggleDone('${t.id}')"
              style="min-width:56px">
        ${t.done ? "↩ 재등록" : "✓ Done"}
      </button>
      <button class="btn btn-sm btn-red" onclick="removeTodo('${t.id}')">✕</button>
    </div>`;

  let out = pending.map(renderItem).join("");

  if (done.length) {
    out += `<div style="margin-top:10px;padding:6px 2px;font-size:.78em;
                        color:#888;border-top:1px dashed #ddd;letter-spacing:.3px">
              ✅ 완료된 항목
            </div>`;
    out += done.map(renderItem).join("");
  }

  list.innerHTML = out;
}

function addTodo() {
  const name = id("newName").value.trim();
  const dur  = parseInt(id("newDur").value, 10);
  if (!name) { id("newName").focus(); return; }
  if (!dur || dur < 1) { id("newDur").focus(); return; }
  todos.push({ id: Date.now().toString(36), name, dur, done: false });
  saveTodos(); renderTodos();
  id("newName").value = ""; id("newName").focus();
}

function removeTodo(tid) {
  todos = todos.filter(t => t.id !== tid);
  saveTodos(); renderTodos();
}

function toggleDone(tid) {
  const t = todos.find(t => t.id === tid);
  if (!t) return;
  if (t.done) {
    // 재등록: done → false로만 변경 (제목 변경 없음)
    t.done = false;
    t.reRegister = true; // 재등록 플래그 → Outlook 등록 시 제목에 (재등록) 추가
    // 이전에 배분된 슬롯은 localBusy에서 제거 (해당 시간 재사용 가능)
    const prev = assignments.find(a => a.todo.id === tid);
    if (prev && prev.s) {
      localBusy = localBusy.filter(b => !(Math.abs(b.s - prev.s) < 60000));
    }
    // assignments에서도 제거 (재배분 대상으로)
    assignments = assignments.filter(a => a.todo.id !== tid);
  } else {
    t.done = true;
  }
  saveTodos(); renderTodos();
}


// ── 드래그 앤 드롭 ────────────────────────────────────────────
let dragId = null;
function dragStart(e, id) {
  dragId = id;
  setTimeout(() => e.target.closest(".todo-item").classList.add("dragging"), 0);
}
function dragEnd(e) {
  e.target.closest(".todo-item")?.classList.remove("dragging");
  document.querySelectorAll(".todo-item").forEach(el => el.classList.remove("drag-over"));
  dragId = null;
}
function dragOver(e) {
  e.preventDefault();
  e.target.closest(".todo-item")?.classList.add("drag-over");
}
function dragLeave(e) {
  e.target.closest(".todo-item")?.classList.remove("drag-over");
}
function dropOn(e, targetId) {
  e.preventDefault();
  e.target.closest(".todo-item")?.classList.remove("drag-over");
  if (!dragId || dragId === targetId) return;
  const fromIdx = todos.findIndex(t => t.id === dragId);
  const toIdx   = todos.findIndex(t => t.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = todos.splice(fromIdx, 1);
  todos.splice(toIdx, 0, moved);
  saveTodos(); renderTodos();
}

// ── 빈 시간 찾기 ──────────────────────────────────────────────
async function findSlots() {
  const emailB  = id("emailB").value.trim();
  const partner = id("partnerEmail").value.trim();
  partnerEmailGlobal = partner;
  if (!emailB)   { alert("B 이메일을 입력해주세요."); return; }
  if (!partner)  { alert("C 이메일을 입력해주세요."); return; }
  localStorage.setItem("ts_emailB", emailB);
  localStorage.setItem("ts_emailC", partner);
  if (!todos.filter(t=>!t.done).length) { alert("미완료 할일이 없습니다."); return; }

  const btn = id("findBtn");
  btn.innerHTML = '<span class="spinner"></span>일정 조회 중...';
  btn.disabled = true;
  hide("findMsg"); hide("resultsCard");

  try {
    const token  = await getToken();

    const startDate = id("startDate").value;
    const days      = parseInt(id("spreadDays").value, 10);
    const workStart = parseInt(id("workStart").value, 10);
    const workEnd   = parseInt(id("workEnd").value, 10);
    const bufMins   = parseInt(id("bufferMins").value, 10);
    const inclSat   = !!parseInt(id("inclSat").value, 10);
    const inclSun   = !!parseInt(id("inclSun").value, 10);

    // Calculate actual end date (spreadDays + weekend buffer)
    const [sy, sm, sd] = startDate.split("-").map(Number);
    const endDateObj = new Date(sy, sm-1, sd + days + 7);
    const endDateStr = `${endDateObj.getFullYear()}-${String(endDateObj.getMonth()+1).padStart(2,"0")}-${String(endDateObj.getDate()).padStart(2,"0")}`;

    const schedData = await getSchedule(
      token,
      [...new Set([emailB, partner].filter(Boolean))],
      startDate + "T00:00:00",
      endDateStr + "T23:59:00"
    );

    assignments = buildSchedule(todos, schedData, {
      startDate, spreadDays: days, workStart, workEnd,
      inclSat, inclSun, bufferMins: bufMins,
      localBusy  // 방금 등록한 슬롯 포함
    });

    renderResults();
    show("resultsCard");
    show("createBtn");

    showEl("findMsg", `✅ B 일정 조회 완료 — C 캘린더에 배분 — ${assignments.filter(a=>a.s).length}개 배분, ${assignments.filter(a=>!a.s).length}개 미배분`, "ok");
  } catch(e) {
    showEl("findMsg", "❌ 오류: " + e.message, "err");
  } finally {
    btn.innerHTML = "🔍 빈 시간 찾기";
    btn.disabled = false;
  }
}

function renderResults() {
  show("resultsCard");
  const scheduled   = assignments.filter(a => a.s);
  const unscheduled = assignments.filter(a => !a.s);

  let html = "";
  for (const a of assignments) {
    if (a.s) {
      html += `<div class="slot-item">
        <div class="slot-name">📌 ${esc(a.todo.name)}</div>
        <div class="slot-time">🕐 ${msToDisplay(a.s)} → ${msToDisplay(a.e)}  (${a.todo.dur}분)</div>
      </div>`;
    } else {
      html += `<div class="slot-item err">
        <div class="slot-name">⚠️ ${esc(a.todo.name)}</div>
        <div class="slot-time">배분 기간 내 빈 시간 부족 — 일수를 늘려주세요</div>
      </div>`;
    }
  }

  id("resultsList").innerHTML = html || '<div class="empty-state">배분할 항목이 없습니다</div>';
  scheduled.length ? show("createBtn") : hide("createBtn");
}

// ── Outlook 등록 ──────────────────────────────────────────────
async function createEvents() {
  const scheduled = assignments.filter(a => a.s);
  if (!scheduled.length) return;

  const btn = id("createBtn");
  btn.innerHTML = '<span class="spinner"></span>등록 중...';
  btn.disabled = true;
  hide("createMsg");

  try {
    const token = await getToken();
    let ok = 0, fail = 0;
    for (const a of scheduled) {
      try {
        const subject = a.todo.reRegister ? a.todo.name + " (재등록)" : a.todo.name;
        await createCalEvent(token, subject, msToKSTiso(a.s), msToKSTiso(a.e));
        ok++;
      } catch { fail++; }
    }

    // localBusy만 업데이트 (done 처리는 사용자가 직접)
    for (const a of scheduled) {
      localBusy.push({ s: a.s, e: a.e });
    }
    renderTodos();

    showEl("createMsg",
      `✅ ${ok}개 Outlook 캘린더에 등록되었습니다!` + (fail ? ` (${fail}개 실패)` : ""), "ok");
    // 버튼 완전 초기화 (재사용 가능 상태로)
    btn.innerHTML = "📌 Outlook 캘린더에 등록";
    btn.disabled = false;
    hide("createBtn");
    hide("resultsCard");
    hide("findMsg");
    // 다음 조회를 위해 완전 초기화
    assignments = [];
    scheduleCache = null;
  } catch(e) {
    showEl("createMsg", "❌ " + e.message, "err");
    btn.innerHTML = "📌 Outlook 캘린더에 등록";
    btn.disabled = false;
  }
}

// ── UI 헬퍼 ──────────────────────────────────────────────────
function id(x) { return document.getElementById(x); }
function show(x) { (typeof x==="string"?id(x):x)?.classList.remove("hidden"); }
function hide(x) { (typeof x==="string"?id(x):x)?.classList.add("hidden"); }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function showEl(elId, msg, type="err") {
  const el = id(elId);
  el.className = `msg msg-${type}`;
  el.textContent = msg;
  show(el);
}

function showMain(email) {
  hide("loginScreen");
  show("mainScreen");
  id("userEmail").textContent = email;
  // 저장된 메일 복원
  const savedB = localStorage.getItem("ts_emailB");
  const savedC = localStorage.getItem("ts_emailC");
  if (savedB) id("emailB").value = savedB;
  if (savedC) id("partnerEmail").value = savedC;
  // Set default start date to tomorrow
  const tom = new Date(); tom.setDate(tom.getDate() + 1);
  id("startDate").value = tom.toLocaleDateString("fr-CA"); // YYYY-MM-DD
  renderTodos();
}
